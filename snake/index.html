<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snake Pro - Trải nghiệm mới</title>
    <style>
        :root {
            --primary: #4571e3;
            --secondary: #5a84f0;
            --apple: #e74c3c;
            --grass-light: #aad751;
            --grass-dark: #a2d149;
            --ui-bg: #ffffff;
            --text-main: #2c3e50;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: var(--text-main);
            overflow: hidden;
            touch-action: none;
        }

        /* UI Header */
        #ui-header {
            width: 100%;
            max-width: 500px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: var(--ui-bg);
            border-radius: 15px 15px 0 0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            z-index: 5;
        }

        .stat-box { text-align: center; }
        .stat-label { font-size: 12px; text-transform: uppercase; color: #7f8c8d; font-weight: bold; }
        .stat-value { font-size: 24px; font-weight: 800; color: var(--primary); }

        #game-container {
            position: relative;
            background: #fff;
            padding: 10px;
            border-radius: 0 0 15px 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 95vw;
        }

        canvas {
            display: block;
            background-color: var(--grass-light);
            border-radius: 8px;
            max-width: 100%;
            height: auto;
            image-rendering: pixelated;
        }

        /* Overlay Screens */
        .overlay {
            position: absolute;
            top: 10px; left: 10px; right: 10px; bottom: 10px;
            background: rgba(255, 255, 255, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            border-radius: 8px;
            backdrop-filter: blur(4px);
            transition: all 0.3s ease;
        }

        h1 { margin: 0 0 10px 0; color: var(--primary); font-size: 32px; }
        p { margin: 0 0 20px 0; color: #636e72; }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            box-shadow: 0 4px 15px rgba(69, 113, 227, 0.3);
        }
        .btn:hover { background: var(--secondary); transform: translateY(-2px); }
        .btn:active { transform: translateY(0); }

        /* Controls */
        #audio-toggle {
            background: none; border: none; font-size: 24px; cursor: pointer;
        }

        #pause-indicator {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 40px;
            font-weight: 900;
            color: rgba(0,0,0,0.2);
            pointer-events: none;
            display: none;
        }

        .instruction {
            margin-top: 15px;
            font-size: 13px;
            color: #95a5a6;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="ui-header">
        <div class="stat-box">
            <div class="stat-label">Điểm</div>
            <div id="score" class="stat-value">00</div>
        </div>
        <button id="audio-toggle" title="Bật/Tắt âm thanh">🔊</button>
        <div class="stat-box">
            <div class="stat-label">Kỷ lục</div>
            <div id="high-score" class="stat-value">00</div>
        </div>
    </div>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="pause-indicator">TẠM DỪNG</div>

        <!-- Màn hình bắt đầu -->
        <div id="start-screen" class="overlay">
            <h1>SNAKE PRO</h1>
            <p>Dùng Phím mũi tên hoặc Vuốt màn hình</p>
            <button class="btn" onclick="startGame()">BẮT ĐẦU CHƠI</button>
        </div>

        <!-- Màn hình Game Over -->
        <div id="game-over-screen" class="overlay" style="display: none;">
            <h1 style="color: var(--apple);">THẤT BẠI!</h1>
            <p id="final-score">Điểm của bạn: 0</p>
            <button class="btn" onclick="startGame()">CHƠI LẠI</button>
            <button class="btn" style="background:#95a5a6; margin-top:10px; font-size:14px; padding:8px 20px" onclick="showStartScreen()">TRANG CHỦ</button>
        </div>
    </div>

    <div class="instruction">
        [Space]: Tạm dừng | [Enter]: Chơi lại | [ESC]: Trang chủ
    </div>

    <script>
        /** @type {HTMLCanvasElement} */
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreEl = document.getElementById("score");
        const highScoreEl = document.getElementById("high-score");
        const audioBtn = document.getElementById("audio-toggle");
        
        const startScreen = document.getElementById("start-screen");
        const gameOverScreen = document.getElementById("game-over-screen");
        const pauseIndicator = document.getElementById("pause-indicator");

        // Cấu hình game
        let gridSize = 20;
        let tileCount = 20;
        let canvasSize = 400;

        let snake = [];
        let food = { x: 5, y: 5 };
        let dx = 0, dy = -1;
        let nextDx = 0, nextDy = -1;
        
        let score = 0;
        let highScore = localStorage.getItem("snakeHighScoreV2") || 0;
        let isPaused = false;
        let isPlaying = false;
        let soundEnabled = localStorage.getItem("snakeSound") !== "false";

        // Game Loop Control
        let lastRenderTime = 0;
        const INITIAL_SPEED = 400; // Tốc độ di chuyển chậm (ms)
        let gameSpeed = INITIAL_SPEED;

        // Âm thanh
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playTone(freq, type, duration) {
            if (!soundEnabled) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        // Tự động điều chỉnh kích thước Canvas (Responsive)
        function resizeCanvas() {
            const size = Math.min(window.innerWidth * 0.9, 400);
            canvasSize = size;
            canvas.width = canvasSize;
            canvas.height = canvasSize;
            gridSize = canvasSize / tileCount;
            render();
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Khởi tạo trạng thái UI
        highScoreEl.textContent = highScore.toString().padStart(2, '0');
        updateAudioUI();

        function updateAudioUI() {
            audioBtn.textContent = soundEnabled ? "🔊" : "🔇";
            localStorage.setItem("snakeSound", soundEnabled);
        }

        audioBtn.onclick = () => {
            soundEnabled = !soundEnabled;
            updateAudioUI();
        };

        // Điều khiển phím
        window.addEventListener("keydown", e => {
            if (!isPlaying) {
                if (e.key === "Enter") startGame();
                return;
            }

            const k = e.key.toLowerCase();
            if (e.key === "Escape") showStartScreen();
            if (e.key === " ") togglePause();
            if (e.key === "Enter" && gameOverScreen.style.display === "block") startGame();

            if (isPaused) return;

            if ((k === "arrowup" || k === "w") && dy === 0) { nextDx = 0; nextDy = -1; }
            else if ((k === "arrowdown" || k === "s") && dy === 0) { nextDx = 0; nextDy = 1; }
            else if ((k === "arrowleft" || k === "a") && dx === 0) { nextDx = -1; nextDy = 0; }
            else if ((k === "arrowright" || k === "d") && dx === 0) { nextDx = 1; nextDy = 0; }
        });

        // Vuốt màn hình
        let touchStartX = 0, touchStartY = 0;
        canvas.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
        }, {passive: false});

        canvas.addEventListener('touchend', e => {
            if (!isPlaying || isPaused) return;
            const xDiff = e.changedTouches[0].screenX - touchStartX;
            const yDiff = e.changedTouches[0].screenY - touchStartY;
            if (Math.abs(xDiff) > Math.abs(yDiff)) {
                if (Math.abs(xDiff) < 20) return;
                if (xDiff > 0 && dx === 0) { nextDx = 1; nextDy = 0; }
                else if (xDiff < 0 && dx === 0) { nextDx = -1; nextDy = 0; }
            } else {
                if (Math.abs(yDiff) < 20) return;
                if (yDiff > 0 && dy === 0) { nextDx = 0; nextDy = 1; }
                else if (yDiff < 0 && dy === 0) { nextDx = 0; nextDy = -1; }
            }
        }, {passive: false});

        function showStartScreen() {
            isPlaying = false;
            isPaused = false;
            startScreen.style.display = "flex";
            gameOverScreen.style.display = "none";
            pauseIndicator.style.display = "none";
        }

        function startGame() {
            snake = [{ x: 10, y: 10 }, { x: 10, y: 11 }, { x: 10, y: 12 }];
            dx = 0; dy = -1; nextDx = 0; nextDy = -1;
            score = 0;
            gameSpeed = INITIAL_SPEED;
            updateScoreUI();
            
            isPlaying = true;
            isPaused = false;
            startScreen.style.display = "none";
            gameOverScreen.style.display = "none";
            pauseIndicator.style.display = "none";
            
            spawnFood();
            requestAnimationFrame(mainLoop);
            playTone(440, 'sine', 0.1);
        }

        function togglePause() {
            isPaused = !isPaused;
            pauseIndicator.style.display = isPaused ? "block" : "none";
            if (!isPaused) requestAnimationFrame(mainLoop);
        }

        function updateScoreUI() {
            scoreEl.textContent = score.toString().padStart(2, '0');
        }

        function spawnFood() {
            // Dùng while loop thay cho đệ quy để tránh stack overflow
            let newFood;
            let collision = true;
            while (collision) {
                newFood = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount)
                };
                collision = snake.some(p => p.x === newFood.x && p.y === newFood.y);
            }
            food = newFood;
        }

        function mainLoop(currentTime) {
            if (!isPlaying || isPaused) return;

            requestAnimationFrame(mainLoop);
            const secondsSinceLastRender = (currentTime - lastRenderTime);
            
            if (secondsSinceLastRender < gameSpeed) return;
            lastRenderTime = currentTime;

            update();
            render();
        }

        function update() {
            dx = nextDx; dy = nextDy;
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };

            // Va chạm tường
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                return gameOver();
            }

            // Va chạm thân
            if (snake.some(p => p.x === head.x && p.y === head.y)) {
                return gameOver();
            }

            snake.unshift(head);

            // Ăn táo
            if (head.x === food.x && head.y === food.y) {
                score++;
                updateScoreUI();
                playTone(600, 'sine', 0.1);
                spawnFood();
                // Hiệu ứng nhẹ khi ăn
                if (gameSpeed > 100) gameSpeed -= 2;
            } else {
                snake.pop();
            }
        }

        function render() {
            // Vẽ nền Caro
            for (let i = 0; i < tileCount; i++) {
                for (let j = 0; j < tileCount; j++) {
                    ctx.fillStyle = (i + j) % 2 === 0 ? varColor('--grass-light') : varColor('--grass-dark');
                    ctx.fillRect(i * gridSize, j * gridSize, gridSize, gridSize);
                }
            }

            // Vẽ táo (Có hiệu ứng nhịp tim nhẹ bằng Date.now)
            const pulse = Math.sin(Date.now() / 150) * 1.5;
            const fx = food.x * gridSize + gridSize/2;
            const fy = food.y * gridSize + gridSize/2;
            
            ctx.fillStyle = varColor('--apple');
            ctx.beginPath();
            ctx.arc(fx, fy, (gridSize/2.5) + pulse, 0, Math.PI * 2);
            ctx.fill();
            // Cuống táo
            ctx.fillStyle = "#2ecc71";
            ctx.fillRect(fx - 1, fy - gridSize/2, 2, 4);

            // Vẽ rắn
            snake.forEach((p, i) => {
                const isHead = i === 0;
                const x = p.x * gridSize;
                const y = p.y * gridSize;

                if (isHead) {
                    ctx.fillStyle = varColor('--primary');
                    // Đầu rắn bo tròn theo hướng
                    let r = [4,4,4,4];
                    if (dy === -1) r = [10,10,4,4];
                    else if (dy === 1) r = [4,4,10,10];
                    else if (dx === -1) r = [10,4,4,10];
                    else if (dx === 1) r = [4,10,10,4];
                    
                    ctx.beginPath();
                    ctx.roundRect(x, y, gridSize, gridSize, r);
                    ctx.fill();

                    // Mắt
                    ctx.fillStyle = "white";
                    const eyePos = 5;
                    let eyes = [];
                    if (dx !== 0) {
                        const ex = dx > 0 ? x + gridSize - eyePos : x + eyePos;
                        eyes = [{x: ex, y: y+5}, {x: ex, y: y+gridSize-5}];
                    } else {
                        const ey = dy > 0 ? y + gridSize - eyePos : y + eyePos;
                        eyes = [{x: x+5, y: ey}, {x: x+gridSize-5, y: ey}];
                    }
                    eyes.forEach(e => {
                        ctx.beginPath(); ctx.arc(e.x, e.y, 3, 0, Math.PI*2); ctx.fill();
                        ctx.fillStyle = "black";
                        ctx.beginPath(); ctx.arc(e.x + dx, e.y + dy, 1.5, 0, Math.PI*2); ctx.fill();
                        ctx.fillStyle = "white";
                    });
                } else {
                    ctx.fillStyle = varColor('--secondary');
                    ctx.beginPath();
                    ctx.roundRect(x + 1, y + 1, gridSize - 2, gridSize - 2, 4);
                    ctx.fill();
                }
            });
        }

        // Helper lấy màu từ biến CSS
        function varColor(name) {
            return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
        }

        function gameOver() {
            isPlaying = false;
            playTone(150, 'sawtooth', 0.4);
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem("snakeHighScoreV2", highScore);
                highScoreEl.textContent = highScore.toString().padStart(2, '0');
            }

            document.getElementById("final-score").textContent = `Điểm của bạn: ${score}`;
            gameOverScreen.style.display = "flex";
        }
    </script>
</body>
</html>
